version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: subscription-bingo-db
    environment:
      POSTGRES_DB: subscription_bingo
      POSTGRES_USER: bingo_user
      POSTGRES_PASSWORD: bingo_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bingo_user']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: subscription-bingo-cache
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  default:
    name: subscription-bingo-network
